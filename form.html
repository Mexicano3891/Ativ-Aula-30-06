<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Formulário</title>
</head>
<body>
      <h1>Cadastro de aluno</h1>
      <form>

            <!-- input text -->             
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required>

            <!-- input email -->
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Digite seu email" required>

            <!-- input senha -->
            <label for="password">Senha:</label>
            <input type="password" name="password" id="password" placeholder="Digite sua senha" required>

            <!-- input data -->
            <label for="Data">Data</label>
            <input type="date" name="Data" id="Data" placeholder="Data de nascimento" required>

            <!-- input select -->
            <label for="cidade">Cidade:</label>
            <select name="cidade" id="Cidade">

                  <option>Londrina</option>
                  <option>Curitiba</option>
                  <option>Maringá</option>
                  <option>Jataizinho</option>
                  
            </select>

            <label for="historico">Já fez o curso? </label>
            <input type="radio" name="historico"> Sim
            <input type="radio" name="historico"> Não
            
            <!-- input checkbox -->
            <label>
                  <input type="checkbox" name="options"> Aceito os termos
            </label>
            
            <!-- textarea -->
            <label>
                  Observação
             </label>


      <textarea rows="4"></textarea>

             <!-- botão -->
              <button type="submit">
                  Cadastrar
              </button>

      </form>

</body>
</html>
